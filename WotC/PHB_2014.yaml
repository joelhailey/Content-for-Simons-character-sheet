ammunition_variants:
  - id: silvered
    name: Silvered
    source_page: 148
    description: Some monsters that have immunity or resistance to nonmagical weapons are susceptible to silver ammunition, so cautious adventurers invest extra coin to plate their ammunition in silver. You can silver ten pieces of ammunition for 100 gp. This cost represents not only the price of the silver, but the time and expertise needed to add silver to the ammunition without making it less effective.
    pattern_prefix: silvered\s+
